<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockClip Finder AI (V8)</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(26, 32, 53, 0.6);
            --surface-hover: rgba(36, 44, 71, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; background-attachment: fixed;
        }

        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        p.subtitle { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        /* Tabs UI */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { background: transparent; color: var(--text-muted); border: 2px solid transparent; padding: 12px 24px; font-size: 1.1rem; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: rgba(79, 70, 229, 0.1); border-color: var(--primary); color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .search-container { width: 100%; max-width: 900px; margin: 0 auto 40px; padding: 0 20px; }
        .glass-panel { background: var(--surface-color); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-group { display: flex; gap: 16px; flex-wrap: wrap; }
        
        input[type="text"], textarea, select { flex: 1; min-width: 250px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; padding: 16px 20px; border-radius: 12px; font-size: 1.1rem; outline: none; transition: border-color 0.3s; }
        textarea { min-height: 150px; resize: vertical; }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); }
        select { cursor: pointer; appearance: none; }
        select option { background: var(--bg-color); color: white; }

        button { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;}
        button:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--primary); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Progress */
        .progress-overlay { display: none; text-align: center; padding: 40px 0; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .progress-text { font-size: 1.2rem; color: var(--accent); font-weight: 500; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Results / Grid */
        .results-container { max-width: 1400px; margin: 0 auto; padding: 0 20px 60px; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        
        /* Timeline specific CSS */
        .timeline-grid { display: flex; flex-direction: column; gap: 30px; max-width: 900px; margin: 0 auto; }
        .timeline-row { display: flex; gap: 20px; align-items: stretch; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        .timeline-text { flex: 1; font-size: 1.1rem; line-height: 1.6; color: #e2e8f0; display: flex; align-items: center; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; }
        .timeline-video { flex: 1; max-width: 400px; }
        
        @media (max-width: 768px) {
            .timeline-row { flex-direction: column; }
            .timeline-text { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding-right: 0; padding-bottom: 20px; }
            .timeline-video { max-width: 100%; }
        }

        /* Video Card UI */
        .card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; height: 100%; transition: transform 0.3s;}
        .card:hover { border-color: rgba(255,255,255,0.2); }
        .media-container { position: relative; width: 100%; background: #000; overflow: hidden; }
        .media-container video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .badge-container { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px; flex-wrap: wrap; z-index: 2; }
        .badge { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); color: white; }
        .badge.quality { color: #facc15; border-color: rgba(250, 204, 21, 0.3); }
        .badge.score { color: #34d399; border-color: rgba(52, 211, 153, 0.3); }

        .card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .card-meta { display: flex; flex-direction: column; gap: 6px; color: var(--text-muted); font-size: 0.85rem; }
        .meta-row { display: flex; justify-content: space-between; }
        
        .ai-tags { font-size: 0.75rem; color: #cbd5e1; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
        .ai-query { background: rgba(79, 70, 229, 0.1); color: #818cf8; padding: 6px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(79, 70, 229, 0.2); }
        
        .card-actions { display: flex; gap: 10px; margin-top: auto; padding-top: 10px; }
        .btn-outline, .btn-primary { flex: 1; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: white; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .error-message { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 16px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2); text-align: center; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <header>
        <h1>StockClip Finder AI</h1>
        <p class="subtitle">Powered by Groq Llama-3, FAISS, and CLIP Vision Engine</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('search')">Search AI (Clips)</button>
        <button class="tab-btn" onclick="switchTab('autopilot')">Auto-Pilot (Script to Video)</button>
    </div>

    <div class="search-container">
        <div class="glass-panel">
            <div class="error-message" id="errorBox"></div>
            
            <div class="input-group" style="margin-bottom: 10px;">
                <select id="orientationSelect">
                    <option value="landscape">Landscape (16:9)</option>
                    <option value="portrait">Portrait (9:16)</option>
                </select>
                <select id="qualitySelect">
                    <option value="any">Any Quality</option>
                    <option value="720">720p+</option>
                    <option value="1080" selected>1080p+</option>
                    <option value="4k">4K Only</option>
                </select>
            </div>

            <form id="searchForm" class="tab-content active">
                <div class="input-group">
                    <input type="text" id="queryInput" placeholder="Describe the scene..." required>
                </div>
                <button type="submit" style="margin-top:16px;">Search with AI Vision</button>
            </form>

            <form id="timelineForm" class="tab-content">
                <div class="input-group">
                    <textarea id="scriptInput" placeholder="Paste your script here... The AI will read it, generate Groq keywords, and find the perfect video for each sentence!" required></textarea>
                </div>
                <button type="submit" style="margin-top:16px;">Generate Video Timeline</button>
            </form>

        </div>
    </div>

    <div class="progress-overlay" id="progressOverlay">
        <div class="spinner"></div>
        <div class="progress-text" id="progressText">Engaging AI Brain...</div>
    </div>

    <div class="results-container">
        <div id="resultsArea"></div>
    </div>

    <script>
        const errorBox = document.getElementById('errorBox');
        const progressOverlay = document.getElementById('progressOverlay');
        const progressText = document.getElementById('progressText');
        const resultsArea = document.getElementById('resultsArea');
        let progressInterval;
        let currentMode = 'search';

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(mode === 'search' ? 'searchForm' : 'timelineForm').classList.add('active');
            resultsArea.innerHTML = '';
            errorBox.style.display = 'none';
        }

        const loadingStates = {
            'search': ["Groq AI generating 5 smart queries...", "Fetching hundreds of raw clips...", "FAISS mapping semantic vectors...", "CLIP Vision verifying frames...", "KMeans clustering diverse results..."],
            'autopilot': ["Parsing script narrative...", "Groq AI generating scene queries...", "FAISS mapping texts...", "CLIP Vision extracting frames...", "Assembling timeline..."]
        };

        function startProgressAnimation() {
            progressOverlay.style.display = 'flex';
            resultsArea.innerHTML = '';
            errorBox.style.display = 'none';
            document.querySelectorAll('button[type="submit"]').forEach(b => b.disabled = true);
            
            let stateIndex = 0;
            const states = loadingStates[currentMode];
            progressText.innerText = states[0];
            
            progressInterval = setInterval(() => {
                stateIndex++;
                if (stateIndex < states.length) progressText.innerText = states[stateIndex];
            }, 1500);
        }

        function stopProgressAnimation() {
            clearInterval(progressInterval);
            progressOverlay.style.display = 'none';
            document.querySelectorAll('button[type="submit"]').forEach(b => b.disabled = false);
        }

        function showError(msg) { errorBox.innerText = msg; errorBox.style.display = 'block'; }

        function createVideoCard(clip, orientation) {
            if (!clip) return `<div class="card"><div class="card-body" style="justify-content:center; align-items:center; color:#ef4444;">No highly relevant clip found.</div></div>`;
            const aspectStyle = orientation === 'portrait' ? 'aspect-ratio: 9/16;' : 'aspect-ratio: 16/9;';
            
            // Format tags to look clean
            let displayTags = clip.tags ? clip.tags : 'N/A';
            if (displayTags.length > 60) displayTags = displayTags.substring(0, 60) + '...';

            return `
                <div class="card">
                    <div class="media-container" style="${aspectStyle}">
                        <video src="${clip.download_url}" poster="${clip.thumbnail}" muted loop onmouseover="this.play()" onmouseout="this.pause()" playsinline></video>
                        <div class="badge-container">
                            <span class="badge quality">${clip.quality_label}</span>
                            <span class="badge score">Final Score: ${clip.score}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <div class="meta-row">
                                <span>Res: ${clip.aspect_ratio}</span>
                                <span>Source: ${clip.source}</span>
                            </div>
                            <div class="ai-tags">🏷️ Tags: ${displayTags}</div>
                            <div class="ai-query">🔍 Query: ${clip.query_used}</div>
                        </div>
                        <div class="card-actions">
                            <a href="${clip.url}" target="_blank" class="btn-outline">View Source</a>
                            <a href="${clip.download_url}" target="_blank" download class="btn-primary">Download</a>
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('queryInput').value;
            const orientation = document.getElementById('orientationSelect').value;
            const quality = document.getElementById('qualitySelect').value;

            startProgressAnimation();
            try {
                const res = await fetch('/search', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({query, orientation, quality})});
                const data = await res.json();
                stopProgressAnimation();
                if (!data.success) return showError(data.error);
                if (data.clips.length === 0) return showError('No high-quality semantic matches found.');

                let gridHTML = '<div class="grid">';
                data.clips.forEach(clip => gridHTML += createVideoCard(clip, orientation));
                gridHTML += '</div>';
                resultsArea.innerHTML = gridHTML;
            } catch (err) { stopProgressAnimation(); showError('Network Error.'); }
        });

        document.getElementById('timelineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const script = document.getElementById('scriptInput').value;
            const orientation = document.getElementById('orientationSelect').value;
            const quality = document.getElementById('qualitySelect').value;

            startProgressAnimation();
            try {
                const res = await fetch('/generate-timeline', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({script, orientation, quality})});
                const data = await res.json();
                stopProgressAnimation();
                
                if (!data.success) return showError(data.error);
                if (data.timeline.length === 0) return showError('Could not generate timeline.');

                let html = '<div class="timeline-grid">';
                data.timeline.forEach((item, index) => {
                    html += `
                        <div class="timeline-row">
                            <div class="timeline-text">
                                <div><strong style="color:var(--accent);">Scene ${index + 1}:</strong><br><br>"${item.scene_text}"</div>
                            </div>
                            <div class="timeline-video">
                                ${createVideoCard(item.clip, orientation)}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                resultsArea.innerHTML = html;
            } catch (err) { stopProgressAnimation(); showError('Network Error.'); }
        });
    </script>
</body>
</html>
