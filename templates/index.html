<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockClip AI Pro</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #161b32;
            --primary: #4f46e5;
            --accent: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --safe-area-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow-x: hidden; min-height: 100vh;
        }

        /* App Shell Header */
        header {
            padding: calc(15px + var(--safe-area-top)) 20px 15px;
            background: rgba(22, 27, 50, 0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: transparent; border: none; color: var(--text); cursor: pointer; padding: 0; display: flex; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(45deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 🔥 CLEAN SIDEBAR (Meta Studio Style) */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(2px);
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }
        
        .side-drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--surface); z-index: 500; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.05); box-shadow: 5px 0 20px rgba(0,0,0,0.6);
            display: flex; flex-direction: column;
        }
        .side-drawer.active { transform: translateX(280px); }
        
        .drawer-header {
            padding: calc(20px + var(--safe-area-top)) 20px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .drawer-header h3 { margin: 0; font-size: 1.1rem; color: var(--text); letter-spacing: 1px; }
        
        .drawer-links { padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .drawer-link {
            padding: 12px 15px; display: flex; align-items: center; gap: 15px; background: transparent; border: none;
            color: var(--text-dim); text-decoration: none; font-weight: 500; transition: 0.2s; cursor: pointer; text-align: left; font-size: 1rem; border-radius: 10px;
        }
        .drawer-link:hover { background: rgba(255,255,255,0.05); color: var(--text); }

        /* 🔥 CLEAN MODAL (Meta Studio Style) */
        .api-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 600;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .api-modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .api-modal {
            background: var(--surface); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .api-modal-overlay.active .api-modal { transform: scale(1); }
        
        .api-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .api-modal-header h3 { margin: 0; display: flex; align-items: center; gap: 10px; }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex; background: var(--surface); margin: 20px; border-radius: 12px; padding: 5px; gap: 5px;
        }
        .tab-btn {
            flex: 1; border: none; background: transparent; color: var(--text-dim); padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Search Section */
        .content-wrap { padding: 0 20px 100px; }
        .glass-card { background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); }
        textarea { height: 120px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-main, .btn-outline {
            width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; border: none;
        }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }

        /* Status Text (Meta Studio Style) */
        .status-msg { font-size: 0.8rem; margin-top: 10px; display: none; }
        .status-msg.success { color: var(--accent); display: block; }
        .status-msg.error { color: #ef4444; display: block; }
        .status-msg.warn { color: #facc15; display: block; }

        /* Results Area */
        #resultsOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 200;
            display: none; flex-direction: column;
        }
        .overlay-header { padding: calc(15px + var(--safe-area-top)) 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .results-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        /* Video Card */
        .video-card { background: var(--surface); border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .video-thumb { position: relative; width: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        
        .card-info { padding: 15px; }
        .ai-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; flex-direction: column; gap: 5px; }
        .tag-chip { color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 2px 6px; border-radius: 4px; }

        /* Progress Loader */
        .loader-wrap {
            position: fixed; inset: 0; background: rgba(11, 15, 25, 0.9); z-index: 800;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
            <div class="logo">STOCKCLIP AI</div>
        </div>
        <div id="statusDot" style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent);"></div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleSidebar()"></div>
    <div class="side-drawer" id="sideDrawer">
        <div class="drawer-header">
            <h3>MENU</h3>
            <button class="menu-btn" onclick="toggleSidebar()"><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-links">
            <button class="drawer-link" onclick="toggleApiModal()"><i data-lucide="key"></i> API Settings</button>
            <a href="/docs" class="drawer-link"><i data-lucide="book-open"></i> Documentation</a>
        </div>
    </div>

    <div class="api-modal-overlay" id="apiModalOverlay">
        <div class="api-modal">
            <div class="api-modal-header">
                <h3><i data-lucide="lock" class="text-blue-400"></i> API Security</h3>
                <button class="menu-btn" onclick="toggleApiModal()"><i data-lucide="x"></i></button>
            </div>
            
            <div class="input-group">
                <label>Your Frontend Key</label>
                <input type="password" id="userApiKeyInput" placeholder="Enter your Secret Key...">
                <p id="saveStatus" class="status-msg"></p>
            </div>
            
            <div style="display:flex; gap:10px; margin-top: 20px;">
                <button class="btn-outline" style="padding: 12px; color: var(--text-dim);" onclick="clearApiKey()">Delete</button>
                <button class="btn-main" style="padding: 12px;" onclick="saveApiKey()">Save Key</button>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchMode('search')"><i data-lucide="search"></i> Clips</button>
        <button class="tab-btn" onclick="switchMode('timeline')"><i data-lucide="clapperboard"></i> Script</button>
    </div>

    <div class="content-wrap">
        <div class="glass-card">
            <div id="searchView">
                <div class="input-group">
                    <label>What scene do you need?</label>
                    <input type="text" id="queryInput" placeholder="e.g. Man hiking in mountains 4k">
                </div>
            </div>

            <div id="timelineView" style="display: none;">
                <div class="input-group">
                    <label>Paste your full script</label>
                    <textarea id="scriptInput" placeholder="The AI will analyze each sentence and find the perfect clips..."></textarea>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Orientation</label>
                    <select id="orientation">
                        <option value="landscape">Landscape</option>
                        <option value="portrait">Portrait</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Quality</label>
                    <select id="quality">
                        <option value="1080">1080p+</option>
                        <option value="4k">4K Only</option>
                        <option value="any">Any</option>
                    </select>
                </div>
            </div>

            <button class="btn-main" onclick="startAI()"><i data-lucide="cpu"></i> RUN INTELLIGENCE</button>
            <p id="runErrorStatus" class="status-msg text-center mt-3"></p>
        </div>
    </div>

    <div id="resultsOverlay">
        <div class="overlay-header">
            <button onclick="closeResults()" class="menu-btn"><i data-lucide="chevron-left"></i></button>
            <span style="font-weight: bold; font-size: 1.1rem;">Results</span>
        </div>
        <div class="results-scroll" id="resultsArea"></div>
    </div>

    <div class="loader-wrap" id="loader">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top: 20px; font-weight: 600; color: var(--accent);"></p>
    </div>

    <script>
        lucide.createIcons();
        let currentMode = 'search';
        const API_KEY_STORAGE_NAME = "SCFAI_FRONTEND_KEY";

        // ==========================================
        // UI TOGGLES (The Clean "Meta Studio" Way)
        // ==========================================
        function toggleSidebar() {
            const drawer = document.getElementById('sideDrawer');
            const overlay = document.getElementById('drawerOverlay');
            drawer.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function toggleApiModal() {
            const overlay = document.getElementById('apiModalOverlay');
            const status = document.getElementById('saveStatus');
            
            if (overlay.classList.contains('active')) {
                // Closing
                overlay.classList.remove('active');
            } else {
                // Opening
                document.getElementById('userApiKeyInput').value = localStorage.getItem(API_KEY_STORAGE_NAME) || "";
                status.className = "status-msg"; // reset status
                status.innerText = "";
                overlay.classList.add('active');
                
                // Close sidebar if open
                if (document.getElementById('sideDrawer').classList.contains('active')) {
                    toggleSidebar();
                }
            }
        }

        function switchMode(m) {
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(m)));
            document.getElementById('searchView').style.display = m === 'search' ? 'block' : 'none';
            document.getElementById('timelineView').style.display = m === 'timeline' ? 'block' : 'none';
            document.getElementById('runErrorStatus').className = "status-msg";
        }

        function openResults() {
            document.getElementById('resultsOverlay').style.display = 'flex';
        }

        function closeResults() {
            document.getElementById('resultsOverlay').style.display = 'none';
        }

        // ==========================================
        // API KEY LOGIC (The Clean "Meta Studio" Way)
        // ==========================================
        function saveApiKey() {
            const key = document.getElementById('userApiKeyInput').value.trim();
            const status = document.getElementById('saveStatus');
            
            if(key === '') {
                status.innerText = "Please enter a valid key!";
                status.className = "status-msg error";
                return;
            }
            
            localStorage.setItem(API_KEY_STORAGE_NAME, key);
            status.innerText = "API Key saved securely locally!";
            status.className = "status-msg success";
            
            document.getElementById('runErrorStatus').className = "status-msg"; // clear run error
            
            setTimeout(() => { toggleApiModal(); }, 1200);
        }

        function clearApiKey() {
            localStorage.removeItem(API_KEY_STORAGE_NAME);
            document.getElementById('userApiKeyInput').value = "";
            const status = document.getElementById('saveStatus');
            status.innerText = "Key removed from browser!";
            status.className = "status-msg warn";
        }

        // ==========================================
        // AI TASK POLLING LOGIC
        // ==========================================
        const steps = ["Groq Brainstorming...", "FAISS Mapping...", "CLIP Vision Checking...", "Finalizing HD Clips..."];
        
        async function startAI() {
            const userKey = localStorage.getItem(API_KEY_STORAGE_NAME);
            const runStatus = document.getElementById('runErrorStatus');
            
            if(!userKey) {
                runStatus.innerText = "Please save your API Key in settings first!";
                runStatus.className = "status-msg error";
                setTimeout(() => toggleApiModal(), 500);
                return;
            }

            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.style.display = 'flex';
            
            let sIdx = 0;
            const timer = setInterval(() => {
                loaderText.innerText = steps[sIdx % steps.length];
                sIdx++;
            }, 2000);

            const payload = currentMode === 'search' 
                ? { query: document.getElementById('queryInput').value, orientation: document.getElementById('orientation').value, quality: document.getElementById('quality').value }
                : { script: document.getElementById('scriptInput').value, orientation: document.getElementById('orientation').value, quality: document.getElementById('quality').value };

            const endpoint = currentMode === 'search' ? '/api/search' : '/api/timeline';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': userKey },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    pollStatus(data.task_id, timer, userKey);
                } else {
                    clearInterval(timer);
                    loader.style.display = 'none';
                    runStatus.innerText = res.status === 401 ? "Unauthorized: Invalid API Key!" : data.error;
                    runStatus.className = "status-msg error";
                }
            } catch (err) {
                clearInterval(timer);
                loader.style.display = 'none';
                runStatus.innerText = "Connection Failed. Backend might be sleeping.";
                runStatus.className = "status-msg error";
            }
        }

        async function pollStatus(tid, timer, userKey) {
            const runStatus = document.getElementById('runErrorStatus');
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`/api/status/${tid}`, {
                        headers: { 'X-API-Key': userKey }
                    });
                    const data = await res.json();
                    
                    if (data.task.status === 'completed') {
                        clearInterval(poll);
                        clearInterval(timer);
                        document.getElementById('loader').style.display = 'none';
                        renderResults(data.task.data);
                    } else if (data.task.status === 'error') {
                        clearInterval(poll);
                        clearInterval(timer);
                        document.getElementById('loader').style.display = 'none';
                        runStatus.innerText = data.task.error;
                        runStatus.className = "status-msg error";
                    }
                } catch(err) {
                    console.log("Polling...");
                }
            }, 3000);
        }

        function renderResults(data) {
            const container = document.getElementById('resultsArea');
            container.innerHTML = '';
            
            const userOrientation = document.getElementById('orientation').value;
            const aspectStyle = userOrientation === 'portrait' ? 'aspect-ratio: 9/16;' : 'aspect-ratio: 16/9;';
            
            if (currentMode === 'search') {
                data.forEach(clip => {
                    container.innerHTML += `
                        <div class="video-card">
                            <div class="video-thumb" style="${aspectStyle}">
                                <video src="${clip.download_url}" poster="${clip.thumbnail}" muted loop onmouseover="this.play()" onmouseout="this.pause()" playsinline></video>
                                <span class="badge">${clip.quality_label}</span>
                            </div>
                            <div class="card-info">
                                <div class="ai-meta">
                                    <span><span class="tag-chip">CLIP Vision: ${clip.visual_score}%</span></span>
                                    <span>🔍 ${clip.query_used}</span>
                                </div>
                                <div style="display:flex; gap:10px; margin-top:12px;">
                                    <a href="${clip.download_url}" style="flex:1; text-align:center; padding:10px; background:var(--primary); color:white; border-radius:8px; text-decoration:none; font-size:0.8rem; font-weight:bold;">DOWNLOAD</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                data.forEach((item, idx) => {
                    container.innerHTML += `
                        <div style="margin-bottom:30px;">
                            <p style="font-size:0.9rem; color:var(--text-dim); margin-bottom:10px;">Scene ${idx+1}: "${item.scene_text}"</p>
                            ${item.clip ? `
                                <div class="video-card">
                                    <div class="video-thumb" style="${aspectStyle}"><video src="${item.clip.download_url}" poster="${item.clip.thumbnail}" muted loop onmouseover="this.play()" playsinline></video></div>
                                </div>
                            ` : '<p style="color:red; font-size:0.9rem;">No high quality clip found for this scene.</p>'}
                        </div>
                    `;
                });
            }
            openResults();
        }

        // PWA Setup
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log("SW Error", err));
        }
    </script>
</body>
</html>
