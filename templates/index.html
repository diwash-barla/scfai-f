<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockClip AI Pro</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #161b32;
            --primary: #4f46e5;
            --accent: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --safe-area-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow-x: hidden; min-height: 100vh;
        }

        /* App Shell Header */
        header {
            padding: calc(15px + var(--safe-area-top)) 20px 15px;
            background: rgba(22, 27, 50, 0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { 
            background: transparent; border: none; color: var(--text); cursor: pointer; padding: 8px;
            display: flex; align-items: center; border-radius: 8px; transition: background 0.2s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.1); }
        .menu-btn:focus { outline: 2px solid var(--primary); outline-offset: 2px; }
        
        .logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(45deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Status indicator */
        .status-indicator {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px; background: rgba(16, 185, 129, 0.1); border-radius: 6px;
            font-size: 0.85rem; color: var(--accent);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Side Drawer (Hamburger Menu) */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }
        
        .side-drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--surface); z-index: 500; transition: left 0.3s ease;
            border-right: 1px solid rgba(255,255,255,0.05); box-shadow: 5px 0 20px rgba(0,0,0,0.6);
            display: flex; flex-direction: column;
        }
        .side-drawer.active { left: 0; }
        
        .drawer-header {
            padding: calc(20px + var(--safe-area-top)) 20px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .drawer-header h3 { margin: 0; font-size: 1.1rem; color: var(--text); letter-spacing: 1px; }
        
        .drawer-links { padding: 20px 0; display: flex; flex-direction: column; }
        .drawer-link {
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            color: var(--text-dim); text-decoration: none; font-weight: 500; transition: 0.2s;
        }
        .drawer-link:hover { background: rgba(255,255,255,0.05); color: var(--text); border-left: 3px solid var(--primary); padding-left: 22px; }
        .drawer-link:focus { outline: 2px solid var(--primary); outline-offset: -2px; }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex; background: var(--surface); margin: 20px; border-radius: 12px; padding: 5px; gap: 5px;
        }
        .tab-btn {
            flex: 1; border: none; background: transparent; color: var(--text-dim); padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

        /* Search Section */
        .content-wrap { padding: 0 20px 100px; }
        .glass-card { background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; color: white; font-size: 1rem; outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            outline: none;
        }
        textarea { height: 120px; resize: vertical; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: opacity 0.2s;
        }
        .btn-main:hover:not(:disabled) { opacity: 0.9; }
        .btn-main:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
        .btn-main:disabled {
            opacity: 0.6; cursor: not-allowed;
        }

        /* Alert Messages */
        .alert {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none;
        }
        .alert.error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }
        .alert.success { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .alert.show { display: block; }

        /* Results Area */
        #resultsOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 200;
            display: none; flex-direction: column;
        }
        .overlay-header { 
            padding: calc(15px + var(--safe-area-top)) 20px 15px; 
            display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .results-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        /* Video Card */
        .video-card { background: var(--surface); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .video-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .badge { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; 
            font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
        }
        
        .card-info { padding: 15px; }
        .ai-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; flex-direction: column; gap: 5px; }
        .tag-chip { color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 2px 6px; border-radius: 4px; }

        .card-buttons { display: flex; gap: 10px; margin-top: 12px; }
        .card-btn {
            flex: 1; padding: 10px; background: var(--primary); color: white;
            border: none; border-radius: 8px; text-decoration: none; cursor: pointer;
            text-align: center; font-weight: 600; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .card-btn:hover { opacity: 0.9; }

        /* Progress Modal */
        .loader-wrap {
            position: fixed; inset: 0; background: rgba(11, 15, 25, 0.95); z-index: 300;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
        .spinner { 
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); 
            border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .scene-item {
            margin-bottom: 30px;
        }
        .scene-text {
            font-size: 0.9rem; color: var(--text-dim); margin-bottom: 10px;
        }
        .no-clip-message {
            color: var(--error); font-size: 0.9rem;
            padding: 12px; background: rgba(239, 68, 68, 0.1);
            border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" aria-label="Open menu" onclick="openDrawer()"><i data-lucide="menu"></i></button>
            <div class="logo" aria-label="StockClip AI">STOCKCLIP AI</div>
        </div>
        <div class="status-indicator" aria-label="Service status: operational">
            <div class="status-dot"></div>
            <span>Online</span>
        </div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()" aria-hidden="true"></div>
    <div class="side-drawer" id="sideDrawer" role="navigation" aria-label="Settings menu">
        <div class="drawer-header">
            <h3>SETTINGS</h3>
            <button class="menu-btn" aria-label="Close menu" onclick="closeDrawer()"><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-links">
            <a href="/docs" class="drawer-link"><i data-lucide="book-open"></i> API Docs</a>
            <a href="#" class="drawer-link"><i data-lucide="key"></i> API Keys</a>
            <a href="#" class="drawer-link"><i data-lucide="shield-check"></i> System Status</a>
        </div>
    </div>

    <div class="nav-tabs" role="tablist">
        <button class="tab-btn active" role="tab" aria-selected="true" onclick="switchMode('search')"><i data-lucide="search"></i> Clips</button>
        <button class="tab-btn" role="tab" aria-selected="false" onclick="switchMode('timeline')"><i data-lucide="clapperboard"></i> Script</button>
    </div>

    <div class="content-wrap">
        <div class="alert" id="alertBox"></div>
        
        <div class="glass-card">
            <div id="searchView">
                <div class="input-group">
                    <label for="queryInput">What scene do you need?</label>
                    <input type="text" id="queryInput" placeholder="e.g. Man hiking in mountains 4k" aria-describedby="query-hint">
                    <small id="query-hint" style="font-size: 0.75rem; color: var(--text-dim);">Describe the scene or action you're looking for</small>
                </div>
            </div>

            <div id="timelineView" style="display: none;">
                <div class="input-group">
                    <label for="scriptInput">Paste your full script</label>
                    <textarea id="scriptInput" placeholder="The AI will analyze each sentence and find the perfect clips..." aria-describedby="script-hint"></textarea>
                    <small id="script-hint" style="font-size: 0.75rem; color: var(--text-dim);">One scene per line or paragraph</small>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label for="orientation">Orientation</label>
                    <select id="orientation">
                        <option value="landscape">Landscape</option>
                        <option value="portrait">Portrait</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="quality">Quality</label>
                    <select id="quality">
                        <option value="1080">1080p+</option>
                        <option value="4k">4K Only</option>
                        <option value="any">Any</option>
                    </select>
                </div>
            </div>

            <button class="btn-main" id="submitBtn" onclick="startAI()" aria-busy="false"><i data-lucide="cpu"></i> RUN INTELLIGENCE</button>
        </div>
    </div>

    <div id="resultsOverlay">
        <div class="overlay-header">
            <button class="menu-btn" aria-label="Go back" onclick="closeResults()"><i data-lucide="chevron-left"></i></button>
            <span style="font-weight: bold; font-size: 1.1rem;" id="resultTitle">Results</span>
        </div>
        <div class="results-scroll" id="resultsArea" role="region" aria-label="Search results"></div>
    </div>

    <div class="loader-wrap" id="loader" role="status" aria-live="polite" aria-label="Processing request">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top: 20px; font-weight: 600; color: var(--accent);"></p>
    </div>

    <script>
        // ==========================================
        // Configuration & State Management
        // ==========================================
        let currentMode = 'search';
        let isLoading = false;
        let activePollingTimer = null;
        const POLLING_INTERVAL = 3000;
        const MAX_RETRIES = 30; // 90 seconds max polling
        
        const STEPS = [
            "Groq Brainstorming...",
            "FAISS Mapping...",
            "CLIP Vision Checking...",
            "Finalizing HD Clips..."
        ];

        // ==========================================
        // Utility Functions
        // ==========================================
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert ${type} show`;
            setTimeout(() => alertBox.classList.remove('show'), 5000);
        }

        function setLoading(loading) {
            isLoading = loading;
            document.getElementById('submitBtn').disabled = loading;
            document.getElementById('submitBtn').setAttribute('aria-busy', loading);
        }

        function validateInput() {
            const input = currentMode === 'search' 
                ? document.getElementById('queryInput').value.trim()
                : document.getElementById('scriptInput').value.trim();

            if (!input) {
                showAlert(`Please enter a ${currentMode === 'search' ? 'query' : 'script'}`, 'error');
                return false;
            }
            return true;
        }

        // ==========================================
        // UI State Management
        // ==========================================
        function switchMode(m) {
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => {
                const isActive = b.innerText.toLowerCase().includes(m);
                b.classList.toggle('active', isActive);
                b.setAttribute('aria-selected', isActive);
            });
            document.getElementById('searchView').style.display = m === 'search' ? 'block' : 'none';
            document.getElementById('timelineView').style.display = m === 'timeline' ? 'block' : 'none';
        }

        // ==========================================
        // History API (Back Button Management)
        // ==========================================
        function openDrawer() {
            document.getElementById('sideDrawer').classList.add('active');
            document.getElementById('drawerOverlay').classList.add('active');
            history.pushState({view: 'drawer'}, '');
        }

        function closeDrawer() {
            document.getElementById('sideDrawer').classList.remove('active');
            document.getElementById('drawerOverlay').classList.remove('active');
            if(history.state?.view === 'drawer') history.back();
        }

        function openResults() {
            document.getElementById('resultsOverlay').style.display = 'flex';
            history.pushState({view: 'results'}, '');
        }

        function closeResults() {
            document.getElementById('resultsOverlay').style.display = 'none';
            if(history.state?.view === 'results') history.back();
        }

        window.onpopstate = (e) => {
            document.getElementById('sideDrawer').classList.remove('active');
            document.getElementById('drawerOverlay').classList.remove('active');
            
            if (!e.state || e.state.view !== 'results') {
                document.getElementById('resultsOverlay').style.display = 'none';
            }
        };

        // ==========================================
        // API Communication
        // ==========================================
        async function startAI() {
            if (!validateInput()) return;
            if (isLoading) return;

            setLoading(true);
            
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.style.display = 'flex';
            
            let stepIndex = 0;
            const stepTimer = setInterval(() => {
                loaderText.innerText = STEPS[stepIndex % STEPS.length];
                stepIndex++;
            }, 2000);

            const payload = currentMode === 'search' 
                ? {
                    query: document.getElementById('queryInput').value,
                    orientation: document.getElementById('orientation').value,
                    quality: document.getElementById('quality').value
                }
                : {
                    script: document.getElementById('scriptInput').value,
                    orientation: document.getElementById('orientation').value,
                    quality: document.getElementById('quality').value
                };

            const endpoint = currentMode === 'search' ? '/api/search' : '/api/timeline';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Use session/cookies for auth
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }

                const data = await res.json();
                
                if (data.success && data.task_id) {
                    pollStatus(data.task_id, stepTimer);
                } else {
                    clearInterval(stepTimer);
                    setLoading(false);
                    loader.style.display = 'none';
                    showAlert(data.error || 'An error occurred', 'error');
                }
            } catch (err) {
                clearInterval(stepTimer);
                setLoading(false);
                loader.style.display = 'none';
                showAlert('Connection failed. Ensure the backend is running.', 'error');
                console.error('API Error:', err);
            }
        }

        async function pollStatus(taskId, stepTimer) {
            let retryCount = 0;
            
            const poll = setInterval(async () => {
                retryCount++;
                
                if (retryCount > MAX_RETRIES) {
                    clearInterval(poll);
                    clearInterval(stepTimer);
                    setLoading(false);
                    document.getElementById('loader').style.display = 'none';
                    showAlert('Request timed out. Please try again.', 'error');
                    return;
                }

                try {
                    const res = await fetch(`/api/status/${taskId}`, {
                        credentials: 'include'
                    });

                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }

                    const data = await res.json();
                    const task = data.task || data;

                    if (task.status === 'completed') {
                        clearInterval(poll);
                        clearInterval(stepTimer);
                        setLoading(false);
                        document.getElementById('loader').style.display = 'none';
                        
                        if (task.data) {
                            renderResults(task.data);
                        } else {
                            showAlert('No results returned', 'error');
                        }
                    } else if (task.status === 'error') {
                        clearInterval(poll);
                        clearInterval(stepTimer);
                        setLoading(false);
                        document.getElementById('loader').style.display = 'none';
                        showAlert(task.error || 'Processing failed', 'error');
                    }
                } catch(err) {
                    console.log("Polling attempt", retryCount, "...");
                }
            }, POLLING_INTERVAL);

            activePollingTimer = poll;
        }

        // ==========================================
        // Results Rendering
        // ==========================================
        function createVideoCard(clip) {
            const card = document.createElement('div');
            card.className = 'video-card';

            const thumb = document.createElement('div');
            thumb.className = 'video-thumb';

            const video = document.createElement('video');
            video.src = clip.download_url;
            video.poster = clip.thumbnail;
            video.muted = true;
            video.loop = true;
            video.playsinline = true;
            video.setAttribute('aria-label', `Video clip: ${escapeHtml(clip.query_used || 'Search result')}`);
            
            video.addEventListener('mouseover', () => video.play());
            video.addEventListener('mouseout', () => video.pause());

            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = clip.quality_label;

            thumb.appendChild(video);
            thumb.appendChild(badge);

            const info = document.createElement('div');
            info.className = 'card-info';

            const meta = document.createElement('div');
            meta.className = 'ai-meta';

            const scoreChip = document.createElement('span');
            scoreChip.innerHTML = `<span class="tag-chip">CLIP Vision: ${clip.visual_score || 'N/A'}%</span>`;

            const querySpan = document.createElement('span');
            querySpan.textContent = `🔍 ${escapeHtml(clip.query_used || 'Unknown')}`;

            meta.appendChild(scoreChip);
            meta.appendChild(querySpan);

            const buttons = document.createElement('div');
            buttons.className = 'card-buttons';

            const downloadBtn = document.createElement('a');
            downloadBtn.href = clip.download_url;
            downloadBtn.className = 'card-btn';
            downloadBtn.textContent = 'Download';
            downloadBtn.setAttribute('download', '');
            downloadBtn.setAttribute('aria-label', `Download ${escapeHtml(clip.query_used)} clip`);

            const sourceBtn = document.createElement('a');
            sourceBtn.href = clip.source_url || '#';
            sourceBtn.className = 'card-btn';
            sourceBtn.textContent = 'Source';
            sourceBtn.target = '_blank';
            sourceBtn.rel = 'noopener noreferrer';
            sourceBtn.setAttribute('aria-label', 'Visit source website');

            buttons.appendChild(downloadBtn);
            buttons.appendChild(sourceBtn);

            info.appendChild(meta);
            info.appendChild(buttons);

            card.appendChild(thumb);
            card.appendChild(info);

            return card;
        }

        function renderResults(data) {
            const container = document.getElementById('resultsArea');
            container.innerHTML = '';

            if (!data || data.length === 0) {
                const noResults = document.createElement('p');
                noResults.style.textAlign = 'center';
                noResults.style.color = 'var(--text-dim)';
                noResults.textContent = 'No results found. Try different search terms.';
                container.appendChild(noResults);
                openResults();
                return;
            }

            if (currentMode === 'search') {
                data.forEach(clip => {
                    if (clip && clip.download_url) {
                        container.appendChild(createVideoCard(clip));
                    }
                });
            } else {
                // Timeline/Script mode
                data.forEach((item, idx) => {
                    const sceneDiv = document.createElement('div');
                    sceneDiv.className = 'scene-item';

                    const sceneText = document.createElement('p');
                    sceneText.className = 'scene-text';
                    sceneText.textContent = `Scene ${idx + 1}: "${escapeHtml(item.scene_text || '')}`;

                    sceneDiv.appendChild(sceneText);

                    if (item.clip && item.clip.download_url) {
                        sceneDiv.appendChild(createVideoCard(item.clip));
                    } else {
                        const noClip = document.createElement('p');
                        noClip.className = 'no-clip-message';
                        noClip.textContent = 'No high-quality clip found for this scene.';
                        sceneDiv.appendChild(noClip);
                    }

                    container.appendChild(sceneDiv);
                });
            }

            openResults();
        }

        // ==========================================
        // Initialization
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // PWA Service Worker Registration
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.warn('Service Worker registration failed:', err);
                });
            }

            // Add enter key support for search
            document.getElementById('queryInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') startAI();
            });
        });

        // Cleanup polling on page unload
        window.addEventListener('beforeunload', () => {
            if (activePollingTimer) clearInterval(activePollingTimer);
        });
    </script>
</body>
</html>
