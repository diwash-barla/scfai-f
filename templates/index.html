<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockClip AI Pro</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #161b32;
            --primary: #4f46e5;
            --accent: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --safe-area-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow-x: hidden; min-height: 100vh;
        }

        /* App Shell Header */
        header {
            padding: calc(15px + var(--safe-area-top)) 20px 15px;
            background: rgba(22, 27, 50, 0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(45deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex; background: var(--surface); margin: 20px; border-radius: 12px; padding: 5px; gap: 5px;
        }
        .tab-btn {
            flex: 1; border: none; background: transparent; color: var(--text-dim); padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Search Section */
        .content-wrap { padding: 0 20px 100px; }
        .glass-card { background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; color: white; font-size: 1rem; outline: none;
        }
        textarea { height: 120px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Results Area - Full Screen Overly for Mobile Feel */
        #resultsOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 200;
            display: none; flex-direction: column;
        }
        .overlay-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .results-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        /* Video Card */
        .video-card { background: var(--surface); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .video-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        
        .card-info { padding: 15px; }
        .ai-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; flex-direction: column; gap: 5px; }
        .tag-chip { color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 2px 6px; border-radius: 4px; }

        /* Floating Action Button for Docs */
        .fab-docs {
            position: fixed; bottom: 25px; right: 25px; background: var(--surface);
            width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 1px solid var(--primary); color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-decoration: none;
        }

        /* Progress Modal */
        .loader-wrap {
            position: fixed; inset: 0; background: rgba(11, 15, 25, 0.9); z-index: 300;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">STOCKCLIP AI</div>
        <div id="statusDot" style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent);"></div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchMode('search')"><i data-lucide="search"></i> Clips</button>
        <button class="tab-btn" onclick="switchMode('timeline')"><i data-lucide="clapperboard"></i> Script</button>
    </div>

    <div class="content-wrap">
        <div class="glass-card">
            <div id="searchView">
                <div class="input-group">
                    <label>What scene do you need?</label>
                    <input type="text" id="queryInput" placeholder="e.g. Man hiking in mountains 4k">
                </div>
            </div>

            <div id="timelineView" style="display: none;">
                <div class="input-group">
                    <label>Paste your full script</label>
                    <textarea id="scriptInput" placeholder="The AI will analyze each sentence and find the perfect clips..."></textarea>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Orientation</label>
                    <select id="orientation">
                        <option value="landscape">Landscape</option>
                        <option value="portrait">Portrait</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Quality</label>
                    <select id="quality">
                        <option value="1080">1080p+</option>
                        <option value="4k">4K Only</option>
                        <option value="any">Any</option>
                    </select>
                </div>
            </div>

            <button class="btn-main" onclick="startAI()"><i data-lucide="cpu"></i> RUN INTELLIGENCE</button>
        </div>
    </div>

    <a href="/docs" class="fab-docs"><i data-lucide="book-open"></i></a>

    <div id="resultsOverlay">
        <div class="overlay-header">
            <button onclick="closeResults()" style="background: none; border: none; color: white;"><i data-lucide="chevron-left"></i></button>
            <span style="font-weight: bold;" id="resultTitle">Results</span>
        </div>
        <div class="results-scroll" id="resultsArea"></div>
    </div>

    <div class="loader-wrap" id="loader">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top: 20px; font-weight: 600; color: var(--accent);"></p>
    </div>

    <script>
        // 🔥 FRONTEND SECURITY KEY (Vercel Env में जो है वही डालें)
        const API_KEY = "my-super-secret-key"; 
        
        lucide.createIcons();
        let currentMode = 'search';

        function switchMode(m) {
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(m)));
            document.getElementById('searchView').style.display = m === 'search' ? 'block' : 'none';
            document.getElementById('timelineView').style.display = m === 'timeline' ? 'block' : 'none';
        }

        // History API for Back Button control
        function openResults() {
            document.getElementById('resultsOverlay').style.display = 'flex';
            history.pushState({view: 'results'}, '');
        }

        function closeResults() {
            document.getElementById('resultsOverlay').style.display = 'none';
            if(history.state?.view === 'results') history.back();
        }

        window.onpopstate = (e) => {
            if (!e.state || e.state.view !== 'results') {
                document.getElementById('resultsOverlay').style.display = 'none';
            }
        };

        const steps = ["Groq Brainstorming...", "FAISS Mapping...", "CLIP Vision Checking...", "Finalizing HD Clips..."];
        
        async function startAI() {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.style.display = 'flex';
            
            let sIdx = 0;
            const timer = setInterval(() => {
                loaderText.innerText = steps[sIdx % steps.length];
                sIdx++;
            }, 2000);

            const payload = currentMode === 'search' 
                ? { query: document.getElementById('queryInput').value, orientation: document.getElementById('orientation').value, quality: document.getElementById('quality').value }
                : { script: document.getElementById('scriptInput').value, orientation: document.getElementById('orientation').value, quality: document.getElementById('quality').value };

            const endpoint = currentMode === 'search' ? '/api/search' : '/api/timeline';

            try {
                // Initial Task Start
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) pollStatus(data.task_id, timer);
                else {
                    clearInterval(timer);
                    loader.style.display = 'none';
                    alert(data.error);
                }
            } catch (err) {
                clearInterval(timer);
                loader.style.display = 'none';
                alert("Connection Failed");
            }
        }

        async function pollStatus(tid, timer) {
            const poll = setInterval(async () => {
                const res = await fetch(`/api/status/${tid}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await res.json();
                
                if (data.task.status === 'completed') {
                    clearInterval(poll);
                    clearInterval(timer);
                    document.getElementById('loader').style.display = 'none';
                    renderResults(data.task.data);
                } else if (data.task.status === 'error') {
                    clearInterval(poll);
                    clearInterval(timer);
                    document.getElementById('loader').style.display = 'none';
                    alert(data.task.error);
                }
            }, 3000);
        }

        function renderResults(data) {
            const container = document.getElementById('resultsArea');
            container.innerHTML = '';
            
            if (currentMode === 'search') {
                data.forEach(clip => {
                    container.innerHTML += `
                        <div class="video-card">
                            <div class="video-thumb">
                                <video src="${clip.download_url}" poster="${clip.thumbnail}" muted loop onmouseover="this.play()" onmouseout="this.pause()" playsinline></video>
                                <span class="badge">${clip.quality_label}</span>
                            </div>
                            <div class="card-info">
                                <div class="ai-meta">
                                    <span><span class="tag-chip">CLIP Vision: ${clip.visual_score}%</span></span>
                                    <span>🔍 ${clip.query_used}</span>
                                </div>
                                <div style="display:flex; gap:10px; margin-top:12px;">
                                    <a href="${clip.download_url}" style="flex:1; text-align:center; padding:10px; background:var(--primary); color:white; border-radius:8px; text-decoration:none; font-size:0.8rem; font-weight:bold;">DOWNLOAD</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                data.forEach((item, idx) => {
                    container.innerHTML += `
                        <div style="margin-bottom:30px;">
                            <p style="font-size:0.9rem; color:var(--text-dim); margin-bottom:10px;">Scene ${idx+1}: "${item.scene_text}"</p>
                            ${item.clip ? `
                                <div class="video-card">
                                    <div class="video-thumb"><video src="${item.clip.download_url}" poster="${item.clip.thumbnail}" muted loop onmouseover="this.play()" playsinline></video></div>
                                </div>
                            ` : '<p style="color:red">No clip found</p>'}
                        </div>
                    `;
                });
            }
            openResults();
        }

        // SW Registration
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
</body>
</html>
